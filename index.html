<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Aggregator (KML viewer — mobile)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* Grundlayout */
    html,body { height:100%; margin:0; font-family: -apple-system, Roboto, "Segoe UI", Arial, sans-serif; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
    #map { position:fixed; inset:0; width:100vw; height:100vh; }

    /* Fab (menyknapp) - centrerad längst ner */
    .fab {
      position: fixed;
      left: 50%;
      transform: translateX(-50%); /* centrerar horisontellt */
      bottom: 20px;
      width: 56px;
      height: 56px;
      border-radius: 28px;
      background: #1976d2;
      color: white;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 6px 14px rgba(0,0,0,0.24);
      z-index: 1400;
      font-size: 22px;
      touch-action: manipulation;
      border: none;
    }
    .fab:active { transform: translateX(-50%) translateY(1px); }

    /* share-knapp: placera uppe till höger */
    .share-btn {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: #e53935;
      color: white;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 6px 14px rgba(0,0,0,0.24);
      z-index: 1500;
      font-size: 18px;
      border: none;
      padding: 0;
    }
    .share-btn:active { transform: translateY(1px); }

    /* Panel (bottom sheet) */
    .sheet {
      position: fixed;
      left: 8px;
      right: 8px;
      bottom: 96px; /* lämnar plats för centered fab */
      max-height: 56%;
      background: rgba(255,255,255,0.98);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      padding: 10px;
      overflow:auto;
      z-index: 1390;
      transform: translateY(20px);
      transition: transform 200ms ease, opacity 200ms ease;
      opacity: 0;
      pointer-events: none;
    }
    .sheet.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
    .sheet h3 { margin:0 0 8px 0; font-size:1rem; }
    .file-row { display:flex; align-items:center; gap:8px; padding:6px 4px; border-bottom:1px solid #f2f2f2; }
    .file-row label { flex:1; font-size:0.92rem; color:#333; }
    .status {
      position: fixed; left: 12px; top: 12px; background: rgba(0,0,0,0.6); color: white; padding:6px 10px;
      border-radius:10px; font-size:0.85rem; z-index:1400; max-width: calc(100% - 120px); overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .small-btn { background: #eee; border: none; padding:6px 8px; border-radius:6px; font-size:0.85rem; }

    /* Anpassningar för större/high-DPI skärmar */
    @media (min-width: 1024px) and (min-height: 600px) {
      .fab { width:68px; height:68px; border-radius:34px; font-size:26px; bottom:28px; }
      .sheet { bottom:106px; left: 12px; right: 12px; padding:12px; border-radius:14px; }
      .small-btn { padding:8px 10px; font-size:0.95rem; }
      .share-btn { width:54px; height:54px; border-radius:10px; font-size:20px; top:16px; right:16px; }
    }
    @media (min-device-width: 360px) and (min-resolution: 2dppx) {
      .fab { width:72px; height:72px; border-radius:36px; font-size:28px; bottom:30px; }
    }
    @media (min-width: 780px) {
      .sheet { right: 12px; left: auto; bottom: 12px; width: 420px; max-height: 60%; border-radius:8px; }
      .fab { left: 50%; transform: translateX(-50%); bottom: 20px; }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="status" id="status" aria-live="polite" style="display:none;"></div>

  <!-- share-knapp uppe till höger -->
  <button id="sharePosBtn" class="share-btn" title="Dela min plats">📍</button>
  <button id="layersBtn" class="fab" aria-label="Layers">☰</button>

  <div id="layersSheet" class="sheet" role="dialog" aria-hidden="true">
    <h3>Inlästa filer</h3>
    <div id="layersList">
      <div style="color:#666;font-size:0.9rem;padding:8px 4px;">Inga lager inlästa. Vänta medan automatiska laddningen försöker hämta .kml från repo (om aktiverat).</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./vendor/togeojson.min.js"></script>

  <script>
    // ---- Konfiguration för GitHub-auto-load ----
    const githubAuto = {
      enabled: true,
      owner: '',
      repo: '',
      branch: 'main',
    };

    // Alla punkter använder denna fasta standardfärg
    const DEFAULT_POINT_COLOR = '#1976d2';

    function filenameWithoutExt(path) {
      if (!path) return '';
      const base = path.split('/').pop();
      return base.replace(/\.kml$/i, '');
    }

    // Rekursiv style-uppdaterare (används för ev. framtida ändringar)
    function updateLayerStyle(layer, color) {
      try {
        if (!layer) return;
        if (typeof layer.setStyle === 'function') {
          layer.setStyle({ color: color, fillColor: color });
        } else if (layer instanceof L.CircleMarker) {
          layer.setStyle({ color: color, fillColor: color });
        } else if (typeof layer.eachLayer === 'function') {
          layer.eachLayer(function (l) { updateLayerStyle(l, color); });
        } else if (layer.getLayers) {
          layer.getLayers().forEach(function (l) { updateLayerStyle(l, color); });
        }
      } catch (e) { console.warn('Could not update style for a layer', e); }
    }

    const map = L.map('map', { zoomControl: true, tap: true }).setView([59.33, 18.06], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors' }).addTo(map);

    const mapsMeta = []; // { url, name, layer, featureCount }

    const statusEl = document.getElementById('status');
    const layersBtn = document.getElementById('layersBtn');
    const layersSheet = document.getElementById('layersSheet');
    const layersListEl = document.getElementById('layersList');
    const sharePosBtn = document.getElementById('sharePosBtn');

    function showStatus(msg, timeout = 3000) {
      if (!msg) { statusEl.style.display = 'none'; return; }
      statusEl.textContent = msg;
      statusEl.style.display = 'block';
      if (timeout) {
        clearTimeout(showStatus._t);
        showStatus._t = setTimeout(()=> statusEl.style.display = 'none', timeout);
      }
    }

    // renderLayersList: visar endast filnamn (utan .kml) och feature-count i parentes
    function renderLayersList() {
      layersListEl.innerHTML = '';

      if (!mapsMeta.length) {
        const none = document.createElement('div');
        none.style.color = '#666';
        none.style.fontSize = '0.9rem';
        none.style.padding = '8px 4px';
        none.textContent = 'Inga filer inlästa.';
        layersListEl.appendChild(none);
      } else {
        mapsMeta.forEach((m) => {
          const row = document.createElement('div');
          row.className = 'file-row';

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = map.hasLayer(m.layer);
          cb.addEventListener('change', () => { if (cb.checked) map.addLayer(m.layer); else map.removeLayer(m.layer); renderLayersList(); });

          const label = document.createElement('label');
          // visa filnamn utan .kml och behåll antal i parentes
          const name = filenameWithoutExt(m.name || m.url);
          label.textContent = `${name} (${m.featureCount ?? '?'})`;

          row.appendChild(cb);
          row.appendChild(label);
          layersListEl.appendChild(row);
        });
      }

      // Show/Hide all controls
      const ctrlRow = document.createElement('div');
      ctrlRow.style.display = 'flex';
      ctrlRow.style.gap = '8px';
      ctrlRow.style.padding = '8px 4px';
      const showAllBtn = document.createElement('button');
      showAllBtn.className = 'small-btn';
      showAllBtn.textContent = 'Visa alla';
      showAllBtn.addEventListener('click', () => { mapsMeta.forEach(m => map.addLayer(m.layer)); renderLayersList(); });
      const hideAllBtn = document.createElement('button');
      hideAllBtn.className = 'small-btn';
      hideAllBtn.textContent = 'Göm alla';
      hideAllBtn.addEventListener('click', () => { mapsMeta.forEach(m => map.removeLayer(m.layer)); renderLayersList(); });
      ctrlRow.appendChild(showAllBtn);
      ctrlRow.appendChild(hideAllBtn);
      layersListEl.appendChild(ctrlRow);
    }

    async function fetchText(url, opts) {
      const res = await fetch(url, opts);
      if (!res.ok) throw new Error('HTTP ' + res.status + ' för ' + url);
      return await res.text();
    }

    // Laddar KML och använder alltid DEFAULT_POINT_COLOR för styling.
    // Kategorier ignoreras; alla filer hanteras individuellt.
    async function loadKml(url, categoryName, displayName) {
      showStatus('Laddar ' + (displayName || url), 2500);
      try {
        if (typeof toGeoJSON === 'undefined') throw new Error('toGeoJSON saknas — lägg vendor/togeojson.min.js i repo');

        const txt = await fetchText(url);
        const parser = new DOMParser();
        const kmlDoc = parser.parseFromString(txt, 'text/xml');
        const geojson = toGeoJSON.kml(kmlDoc);

        const featureCount = Array.isArray(geojson.features) ? geojson.features.length : 0;
        if (Array.isArray(geojson.features)) {
          geojson.features.forEach(f => { if (!f.properties) f.properties = {}; f.properties._sourceMap = displayName || url; });
        }

        const color = DEFAULT_POINT_COLOR;

        const layer = L.geoJSON(geojson, {
          style: function(feature) { return { color: color, fillColor: color }; },
          onEachFeature: (feature, lyr) => {
            let html = '<strong>' + (feature.properties?.name || '') + '</strong><br/>';
            if (feature.properties?.description) html += feature.properties.description;
            if (feature.properties?._sourceMap) html += '<hr/><em>' + feature.properties._sourceMap + '</em>';
            lyr.bindPopup(html);
          },
          pointToLayer: (feature, latlng) => L.circleMarker(latlng, { radius:6, fillColor: color, color: '#fff', weight:1, fillOpacity:0.95 })
        });

        // Lägg lagret direkt på kartan
        layer.addTo(map);

        // Spara meta: name är filnamnet (behåll .kml i name så vi kan strippa vid visning)
        const meta = { url, name: displayName || url, layer, featureCount };
        mapsMeta.push(meta);

        renderLayersList();
        showStatus('Inläst: ' + (displayName || url) + ' (' + featureCount + ' features)', 3000);

        try {
          const b = layer.getBounds && layer.getBounds();
          if (b && (b.isValid ? b.isValid() : b._southWest)) map.fitBounds(b, { maxZoom: 14 });
        } catch (e) {}
      } catch (err) {
        console.error(err);
        showStatus('Fel: ' + err.message, 5000);
      }
    }

    async function loadAllKmlFromGitHub(owner, repo, branch, token) {
      if (!owner || !repo) throw new Error('owner eller repo saknas');
      const apiUrl = `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/contents/kml` + (branch ? `?ref=${encodeURIComponent(branch)}` : '');
      showStatus('Hämtar fil-lista från GitHub...', 4000);
      const headers = {};
      if (token) headers['Authorization'] = 'token ' + token;
      let res;
      try { res = await fetch(apiUrl, { headers }); } catch (e) { throw new Error('Nätverksfel mot GitHub API: ' + e.message); }
      if (!res.ok) { if (res.status === 404) throw new Error('Katalogen /kml hittades inte i repo'); throw new Error('GitHub API HTTP ' + res.status); }
      const entries = await res.json();
      if (!Array.isArray(entries)) throw new Error('GitHub svarade med oväntat format');
      const kmlFiles = entries.filter(e => e.type === 'file' && e.name.toLowerCase().endsWith('.kml'));
      if (!kmlFiles.length) { showStatus('Inga .kml i /kml', 5000); return; }
      showStatus('Laddar ' + kmlFiles.length + ' KML-filer...', 4000);
      for (const f of kmlFiles) {
        try { await loadKml(f.download_url, null, f.name); } catch (err) { console.warn('Misslyckades ladda', f.name, err); }
      }
      showStatus('Alla tillgängliga KML-filer är inlästa.', 3000);
    }

    function detectOwnerRepoFromLocation() {
      try {
        const host = window.location.hostname;
        const path = window.location.pathname;
        if (!host.endsWith('.github.io')) return null;
        const owner = host.split('.')[0];
        const parts = path.split('/').filter(Boolean);
        const repo = parts.length ? parts[0] : null;
        if (!owner || !repo) return null;
        return { owner, repo };
      } catch (e) { return null; }
    }

    // ---------------------------
    // GEOLOCATION: auto-start
    // ---------------------------
    let _watchId = null;
    let _userMarker = null;
    let _accuracyCircle = null;
    let _firstFix = true;

    function startLocationTracking(options = { enableHighAccuracy: true, maximumAge: 5000, timeout: 10000 }) {
      if (!('geolocation' in navigator)) {
        showStatus('Geolocation stöds inte i denna webbläsare', 5000);
        return;
      }
      if (_watchId !== null) return; // redan aktiv

      _firstFix = true;
      _watchId = navigator.geolocation.watchPosition(pos => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const acc = pos.coords.accuracy || 0;

        if (!_userMarker) {
          _userMarker = L.circleMarker([lat, lng], {
            radius: 8,
            color: '#ffffff',
            weight: 2,
            fillColor: '#ff0000', // röd punkt
            fillOpacity: 0.95,
            pane: 'markerPane'
          }).addTo(map);
        } else {
          _userMarker.setLatLng([lat, lng]);
        }

        if (!_accuracyCircle) {
          _accuracyCircle = L.circle([lat, lng], {
            radius: acc,
            color: '#ff0000',
            weight: 1,
            opacity: 0.25,
            fillOpacity: 0.05,
            interactive: false
          }).addTo(map);
        } else {
          _accuracyCircle.setLatLng([lat, lng]);
          _accuracyCircle.setRadius(acc);
        }

        if (_firstFix) {
          try { map.setView([lat, lng], Math.max(map.getZoom(), 14)); } catch(e) {}
          _firstFix = false;
        }

      }, err => {
        console.warn('Geolocation error', err);
        showStatus('GPS-fel: ' + (err.message || err.code), 4000);
      }, options);
    }

    function stopLocationTracking() {
      if (_watchId !== null) {
        navigator.geolocation.clearWatch(_watchId);
        _watchId = null;
      }
      if (_userMarker) { map.removeLayer(_userMarker); _userMarker = null; }
      if (_accuracyCircle) { map.removeLayer(_accuracyCircle); _accuracyCircle = null; }
      _firstFix = true;
    }

    // ---------------------------
    // SHARE CURRENT LOCATION: one-shot marker + link
    // ---------------------------
    let _shareMarker = null;

    function createShareUrl(lat, lng, zoom) {
      const base = window.location.origin + window.location.pathname;
      return `${base}?loc=${lat.toFixed(6)},${lng.toFixed(6)}&z=${zoom}`;
    }

    function placeShareMarker(lat, lng) {
      if (!_shareMarker) {
        _shareMarker = L.circleMarker([lat, lng], {
          radius:8, color:'#fff', weight:2, fillColor:'#ff5722', fillOpacity:0.95
        }).addTo(map);
      } else {
        _shareMarker.setLatLng([lat, lng]);
      }
    }

    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        showStatus('Länk kopierad till urklipp', 3500);
      } catch (e) {
        showStatus('Kunde inte kopiera — här är länken: ' + text, 6000);
        console.warn('Clipboard error', e);
      }
    }

    function markAndShareCurrentLocation() {
      if (!('geolocation' in navigator)) { showStatus('Geolocation stöds inte', 4000); return; }
      showStatus('Hämtar din position…', 4000);
      navigator.geolocation.getCurrentPosition(async pos => {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const zoom = map.getZoom() || 14;

        placeShareMarker(lat, lng);
        map.setView([lat, lng], Math.max(zoom, 14));

        const url = createShareUrl(lat, lng, map.getZoom());
        await copyToClipboard(url);
        console.log('Dela denna länk:', url);
      }, err => {
        showStatus('Kunde inte hämta position: ' + (err.message || err.code), 5000);
        console.warn('Geolocation error', err);
      }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
    }

    // Restore marker from URL (?loc=lat,lng&z=zoom)
    function restoreFromUrl() {
      try {
        const params = new URLSearchParams(window.location.search);
        const loc = params.get('loc');
        const z = params.get('z');
        if (loc) {
          const [latStr, lngStr] = loc.split(',');
          const lat = parseFloat(latStr);
          const lng = parseFloat(lngStr);
          if (!isNaN(lat) && !isNaN(lng)) {
            placeShareMarker(lat, lng);
            const zoom = z ? parseInt(z,10) : map.getZoom();
            map.setView([lat, lng], isNaN(zoom) ? 14 : zoom);
          }
        }
      } catch (e) { /* ignore */ }
    }

    // ---------------------------
    // Init: auto KML load + auto-start geolocation + URL-restore
    // ---------------------------
    (async () => {
      // attempt auto GitHub load
      if (!githubAuto.enabled) { showStatus('Automatisk GitHub-laddning inaktiverad'); }
      else {
        let owner = githubAuto.owner || null;
        let repo = githubAuto.repo || null;
        const branch = githubAuto.branch || undefined;
        const token = githubAuto.token || undefined;
        if (!owner || !repo) {
          const det = detectOwnerRepoFromLocation();
          if (det) { owner = owner || det.owner; repo = repo || det.repo; console.log('Autodetekterat owner/repo:', owner, repo); }
        }
        if (!owner || !repo) {
          showStatus('Automatisk GitHub-laddning: owner/repo ej angivet och kunde ej upptäckas.', 4000);
        } else {
          try { await loadAllKmlFromGitHub(owner, repo, branch, token); } catch (err) { console.error(err); showStatus('GitHub-auto fel: ' + err.message, 5000); }
        }
      }

      // Restore share marker if URL contains loc
      restoreFromUrl();

      // Start geolocation tracking automatically (requires HTTPS and user permission)
      try {
        startLocationTracking();
      } catch (e) {
        console.warn('Kunde inte starta geolocation automatiskt', e);
      }
    })();

    // Layers button toggles the sheet
    layersBtn.addEventListener('click', () => {
      const open = layersSheet.classList.toggle('open');
      layersSheet.setAttribute('aria-hidden', (!open).toString());
      if (open) renderLayersList();
    });

    // Share button handler
    sharePosBtn.addEventListener('click', markAndShareCurrentLocation);

    // Close sheet on map click
    map.on('click', () => {
      if (layersSheet.classList.contains('open')) {
        layersSheet.classList.remove('open');
        layersSheet.setAttribute('aria-hidden','true');
      }
    });

    // API for console use
    window.AppKml = {
      load: (url, name) => loadKml(url, null, name),
      listFiles: () => mapsMeta.map(m => ({ name: filenameWithoutExt(m.name || m.url), url: m.url, count: m.featureCount })),
      startLocation: startLocationTracking,
      stopLocation: stopLocationTracking,
      shareNow: markAndShareCurrentLocation
    };
  </script>
</body>
</html>
