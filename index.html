<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Aggregator (KML viewer — mobile)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* Grundlayout */
    html,body { height:100%; margin:0; font-family: -apple-system, Roboto, "Segoe UI", Arial, sans-serif; -webkit-tap-highlight-color: transparent; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
    #map { position:fixed; inset:0; width:100vw; height:100vh; }

    /* Fab (menyknapp) - centrerad längst ner */
    .fab {
      position: fixed;
      left: 50%;
      transform: translateX(-50%); /* centrerar horisontellt */
      bottom: 20px;
      width: 56px;
      height: 56px;
      border-radius: 28px;
      background: #1976d2;
      color: white;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 6px 14px rgba(0,0,0,0.24);
      z-index: 1400;
      font-size: 22px;
      touch-action: manipulation;
      border: none;
    }
    .fab:active { transform: translateX(-50%) translateY(1px); }

    /* Panel (bottom sheet) */
    .sheet {
      position: fixed;
      left: 8px;
      right: 8px;
      bottom: 96px; /* lämnar plats för centered fab */
      max-height: 56%;
      background: rgba(255,255,255,0.98);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      padding: 10px;
      overflow:auto;
      z-index: 1390;
      transform: translateY(20px);
      transition: transform 200ms ease, opacity 200ms ease;
      opacity: 0;
      pointer-events: none;
    }
    .sheet.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
    .sheet h3 { margin:0 0 8px 0; font-size:1rem; }
    .layer-row { display:flex; align-items:center; gap:8px; padding:8px 4px; border-bottom:1px solid #eee; }
    .layer-row label { flex:1; font-size:0.95rem; }
    .file-row { display:flex; align-items:center; gap:8px; padding:6px 4px; border-bottom:1px solid #f2f2f2; }
    .file-row label { flex:1; font-size:0.92rem; color:#333; }
    .status {
      position: fixed; left: 12px; top: 12px; background: rgba(0,0,0,0.6); color: white; padding:6px 10px;
      border-radius:10px; font-size:0.85rem; z-index:1400; max-width: calc(100% - 120px); overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .small-btn { background: #eee; border: none; padding:6px 8px; border-radius:6px; font-size:0.85rem; }
    .color-input { width:36px; height:28px; border: none; background:transparent; padding:0; }

    /* Anpassningar för målupplösningen 2340x1080 (och liknande hög-DPI mobilskärmar) */
    /* Större knapp och mer luft på stora/höga enheter */
    @media (min-width: 1024px) and (min-height: 600px) {
      .fab { width:68px; height:68px; border-radius:34px; font-size:26px; bottom:28px; }
      .sheet { bottom:106px; left: 12px; right: 12px; padding:12px; border-radius:14px; }
      .small-btn { padding:8px 10px; font-size:0.95rem; }
    }

    /* Specifikt för skärmar runt 1080×2340 (portrait high-res phones) eller 2340×1080 (landscape) */
    @media (min-device-width: 360px) and (min-resolution: 2dppx) {
      /* öka touch-mål */
      .fab { width:72px; height:72px; border-radius:36px; font-size:28px; bottom:30px; }
      .color-input { width:40px; height:30px; }
    }

    /* Desktop/layout bredare än telefon: placera sheet höger/bred */
    @media (min-width: 780px) {
      .sheet { right: 12px; left: auto; bottom: 12px; width: 420px; max-height: 60%; border-radius:8px; }
      .fab { left: 50%; transform: translateX(-50%); bottom: 20px; } /* fortsatt centrerad */
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="status" id="status" aria-live="polite" style="display:none;"></div>

  <button id="layersBtn" class="fab" aria-label="Layers">☰</button>

  <div id="layersSheet" class="sheet" role="dialog" aria-hidden="true">
    <h3>Layer controls</h3>
    <div id="layersList">
      <div style="color:#666;font-size:0.9rem;padding:8px 4px;">Inga lager inlästa. Vänta medan automatiska laddningen försöker hämta .kml från repo (om aktiverat).</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./vendor/togeojson.min.js"></script>

  <script>
    // ---- Konfiguration för GitHub-auto-load ----
    const githubAuto = {
      enabled: true,
      owner: '',
      repo: '',
      branch: 'main',
    };

    const DEFAULT_POINT_COLOR = '#1976d2';
    const BLANDAT_DEFAULT = '#eee111';
    const categoryColors = {};

    function normalizeCategoryKey(name) { return String(name || '').trim().toLowerCase(); }
    function defaultColorForCategory(name) {
      if (!name) return DEFAULT_POINT_COLOR;
      return normalizeCategoryKey(name) === 'blandat' ? BLANDAT_DEFAULT : DEFAULT_POINT_COLOR;
    }
    function getCategoryColor(name) {
      if (!name) return DEFAULT_POINT_COLOR;
      if (categoryColors[name]) return categoryColors[name];
      const norm = normalizeCategoryKey(name);
      for (const k of Object.keys(categoryColors)) {
        if (normalizeCategoryKey(k) === norm) return categoryColors[k];
      }
      return defaultColorForCategory(name);
    }

    function updateLayerStyle(layer, color) {
      try {
        if (!layer) return;
        if (typeof layer.setStyle === 'function') {
          layer.setStyle({ color: color, fillColor: color });
        } else if (layer instanceof L.CircleMarker) {
          layer.setStyle({ color: color, fillColor: color });
        } else if (typeof layer.eachLayer === 'function') {
          layer.eachLayer(function (l) { updateLayerStyle(l, color); });
        } else if (layer.getLayers) {
          layer.getLayers().forEach(function (l) { updateLayerStyle(l, color); });
        }
      } catch (e) { console.warn('Could not update style for a layer', e); }
    }

    const map = L.map('map', { zoomControl: true, tap: true }).setView([59.33, 18.06], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors' }).addTo(map);

    const categories = {};
    const mapsMeta = [];

    const statusEl = document.getElementById('status');
    const layersBtn = document.getElementById('layersBtn');
    const layersSheet = document.getElementById('layersSheet');
    const layersListEl = document.getElementById('layersList');

    function showStatus(msg, timeout = 3000) {
      if (!msg) { statusEl.style.display = 'none'; return; }
      statusEl.textContent = msg;
      statusEl.style.display = 'block';
      if (timeout) {
        clearTimeout(showStatus._t);
        showStatus._t = setTimeout(()=> statusEl.style.display = 'none', timeout);
      }
    }

    function ensureCategory(name) {
      if (!name) name = 'default';
      if (!categories[name]) categories[name] = L.layerGroup().addTo(map);
      if (!categoryColors[name]) setCategoryColor(name, defaultColorForCategory(name));
      return categories[name];
    }

    function setCategoryColor(name, color) {
      if (!name) name = 'default';
      categoryColors[name] = color;
      const norm = normalizeCategoryKey(name);
      for (const k of Object.keys(categories)) {
        if (normalizeCategoryKey(k) === norm) updateLayerStyle(categories[k], color);
      }
      mapsMeta.forEach(meta => {
        if (normalizeCategoryKey(meta.category) === norm) updateLayerStyle(meta.layer, color);
      });
      renderLayersList();
    }

    function renderLayersList() {
      layersListEl.innerHTML = '';
      const catNames = Object.keys(categories);
      if (catNames.length) {
        const catHeader = document.createElement('div');
        catHeader.style.padding = '6px 4px';
        catHeader.innerHTML = '<strong>Kategorier</strong>';
        layersListEl.appendChild(catHeader);

        catNames.forEach(name => {
          const div = document.createElement('div');
          div.className = 'layer-row';
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = map.hasLayer(categories[name]);
          cb.addEventListener('change', () => { if (cb.checked) map.addLayer(categories[name]); else map.removeLayer(categories[name]); renderLayersList(); });
          const label = document.createElement('label');
          label.textContent = name + ' (' + categories[name].getLayers().length + ')';
          const colorInput = document.createElement('input');
          colorInput.type = 'color';
          colorInput.className = 'color-input';
          const cur = getCategoryColor(name) || defaultColorForCategory(name) || DEFAULT_POINT_COLOR;
          colorInput.value = cur;
          colorInput.title = 'Välj färg för kategori ' + name;
          colorInput.addEventListener('input', (ev) => setCategoryColor(name, ev.target.value));
          div.appendChild(cb);
          div.appendChild(label);
          div.appendChild(colorInput);
          layersListEl.appendChild(div);
        });
      }

      const divider = document.createElement('div');
      divider.style.height = '8px';
      layersListEl.appendChild(divider);

      const filesHeader = document.createElement('div');
      filesHeader.style.padding = '6px 4px';
      filesHeader.innerHTML = '<strong>Inlästa filer</strong>';
      layersListEl.appendChild(filesHeader);

      if (!mapsMeta.length) {
        const none = document.createElement('div');
        none.style.color = '#666';
        none.style.fontSize = '0.9rem';
        none.style.padding = '8px 4px';
        none.textContent = 'Inga filer inlästa.';
        layersListEl.appendChild(none);
      } else {
        mapsMeta.forEach((m) => {
          const row = document.createElement('div');
          row.className = 'file-row';
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.checked = map.hasLayer(m.layer);
          cb.addEventListener('change', () => { if (cb.checked) map.addLayer(m.layer); else map.removeLayer(m.layer); renderLayersList(); });
          const label = document.createElement('label');
          label.textContent = (m.name || m.url) + ' — ' + m.category + ' (' + (m.featureCount ?? '?') + ')';
          const zoomBtn = document.createElement('button');
          zoomBtn.className = 'small-btn';
          zoomBtn.textContent = 'Zoom';
          zoomBtn.addEventListener('click', () => {
            try { const b = m.layer.getBounds && m.layer.getBounds(); if (b && (b.isValid ? b.isValid() : b._southWest)) map.fitBounds(b, { maxZoom: 14 }); } catch (e) {}
          });
          const soloBtn = document.createElement('button');
          soloBtn.className = 'small-btn';
          soloBtn.textContent = 'Ensam';
          soloBtn.title = 'Visa endast denna fil';
          soloBtn.addEventListener('click', () => {
            mapsMeta.forEach(mm => { if (mm === m) map.addLayer(mm.layer); else map.removeLayer(mm.layer); });
            renderLayersList();
          });
          row.appendChild(cb);
          row.appendChild(label);
          row.appendChild(zoomBtn);
          row.appendChild(soloBtn);
          layersListEl.appendChild(row);
        });
      }

      const ctrlRow = document.createElement('div');
      ctrlRow.style.display = 'flex';
      ctrlRow.style.gap = '8px';
      ctrlRow.style.padding = '8px 4px';
      const showAllBtn = document.createElement('button');
      showAllBtn.className = 'small-btn';
      showAllBtn.textContent = 'Visa alla';
      showAllBtn.addEventListener('click', () => { mapsMeta.forEach(m => map.addLayer(m.layer)); renderLayersList(); });
      const hideAllBtn = document.createElement('button');
      hideAllBtn.className = 'small-btn';
      hideAllBtn.textContent = 'Göm alla';
      hideAllBtn.addEventListener('click', () => { mapsMeta.forEach(m => map.removeLayer(m.layer)); renderLayersList(); });
      ctrlRow.appendChild(showAllBtn);
      ctrlRow.appendChild(hideAllBtn);
      layersListEl.appendChild(ctrlRow);
    }

    async function fetchText(url, opts) {
      const res = await fetch(url, opts);
      if (!res.ok) throw new Error('HTTP ' + res.status + ' för ' + url);
      return await res.text();
    }

    function inferCategoryFromFilename(filename) {
      if (!filename) return 'default';
      const f = filename.toLowerCase();
      if (f.includes('blandat') || f.includes('bland')) return 'Blandat';
      return 'default';
    }

    async function loadKml(url, categoryName, displayName) {
      showStatus('Laddar ' + (displayName || url), 2500);
      try {
        if (typeof toGeoJSON === 'undefined') throw new Error('toGeoJSON saknas — lägg vendor/togeojson.min.js i repo');
        const txt = await fetchText(url);
        const parser = new DOMParser();
        const kmlDoc = parser.parseFromString(txt, 'text/xml');
        const geojson = toGeoJSON.kml(kmlDoc);
        const featureCount = Array.isArray(geojson.features) ? geojson.features.length : 0;
        if (Array.isArray(geojson.features)) geojson.features.forEach(f => { if (!f.properties) f.properties = {}; f.properties._sourceMap = displayName || url; });

        const catName = categoryName || inferCategoryFromFilename(displayName || url) || 'default';
        ensureCategory(catName);
        const currentColor = getCategoryColor(catName) || defaultColorForCategory(catName);
        // register explicit color (so color input shows the registered/default value)
        if (!categoryColors[catName]) categoryColors[catName] = currentColor;

        const layer = L.geoJSON(geojson, {
          style: function(feature) { return { color: currentColor, fillColor: currentColor }; },
          onEachFeature: (feature, lyr) => {
            let html = '<strong>' + (feature.properties?.name || '') + '</strong><br/>';
            if (feature.properties?.description) html += feature.properties.description;
            if (feature.properties?._sourceMap) html += '<hr/><em>' + feature.properties._sourceMap + '</em>';
            lyr.bindPopup(html);
          },
          pointToLayer: (feature, latlng) => L.circleMarker(latlng, { radius:6, fillColor: currentColor, color: '#fff', weight:1, fillOpacity:0.95 })
        });

        const cat = ensureCategory(catName);
        layer.addTo(cat);

        const meta = { url, category: catName, name: displayName || url, layer, featureCount, categoryKey: normalizeCategoryKey(catName) };
        mapsMeta.push(meta);

        renderLayersList();
        showStatus('Inläst: ' + (displayName || url) + ' (' + featureCount + ' features)', 3000);

        try { const b = layer.getBounds && layer.getBounds(); if (b && (b.isValid ? b.isValid() : b._southWest)) map.fitBounds(b, { maxZoom: 14 }); } catch (e) {}
      } catch (err) {
        console.error(err);
        showStatus('Fel: ' + err.message, 5000);
      }
    }

    async function loadAllKmlFromGitHub(owner, repo, branch, token) {
      if (!owner || !repo) throw new Error('owner eller repo saknas');
      const apiUrl = `https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/contents/kml` + (branch ? `?ref=${encodeURIComponent(branch)}` : '');
      showStatus('Hämtar fil-lista från GitHub...', 4000);
      const headers = {};
      if (token) headers['Authorization'] = 'token ' + token;
      let res;
      try { res = await fetch(apiUrl, { headers }); } catch (e) { throw new Error('Nätverksfel mot GitHub API: ' + e.message); }
      if (!res.ok) { if (res.status === 404) throw new Error('Katalogen /kml hittades inte i repo'); throw new Error('GitHub API HTTP ' + res.status); }
      const entries = await res.json();
      if (!Array.isArray(entries)) throw new Error('GitHub svarade med oväntat format');
      const kmlFiles = entries.filter(e => e.type === 'file' && e.name.toLowerCase().endsWith('.kml'));
      if (!kmlFiles.length) { showStatus('Inga .kml i /kml', 5000); return; }
      showStatus('Laddar ' + kmlFiles.length + ' KML-filer...', 4000);
      for (const f of kmlFiles) {
        try { const inferredCategory = inferCategoryFromFilename(f.name); await loadKml(f.download_url, inferredCategory, f.name); } catch (err) { console.warn('Misslyckades ladda', f.name, err); }
      }
      showStatus('Alla tillgängliga KML-filer är inlästa.', 3000);
    }

    function detectOwnerRepoFromLocation() {
      try {
        const host = window.location.hostname;
        const path = window.location.pathname;
        if (!host.endsWith('.github.io')) return null;
        const owner = host.split('.')[0];
        const parts = path.split('/').filter(Boolean);
        const repo = parts.length ? parts[0] : null;
        if (!owner || !repo) return null;
        return { owner, repo };
      } catch (e) { return null; }
    }

    (async () => {
      if (!githubAuto.enabled) { showStatus('Automatisk GitHub-laddning inaktiverad'); return; }
      let owner = githubAuto.owner || null;
      let repo = githubAuto.repo || null;
      const branch = githubAuto.branch || undefined;
      const token = githubAuto.token || undefined;
      if (!owner || !repo) {
        const det = detectOwnerRepoFromLocation();
        if (det) { owner = owner || det.owner; repo = repo || det.repo; console.log('Autodetekterat owner/repo:', owner, repo); }
      }
      if (!owner || !repo) { showStatus('Automatisk GitHub-laddning: owner/repo ej angivet och kunde ej upptäckas.', 8000); return; }
      try { await loadAllKmlFromGitHub(owner, repo, branch, token); } catch (err) { console.error(err); showStatus('GitHub-auto fel: ' + err.message, 8000); }
    })();

    layersBtn.addEventListener('click', () => {
      const open = layersSheet.classList.toggle('open');
      layersSheet.setAttribute('aria-hidden', (!open).toString());
      if (open) renderLayersList();
    });

    map.on('click', () => {
      if (layersSheet.classList.contains('open')) {
        layersSheet.classList.remove('open');
        layersSheet.setAttribute('aria-hidden','true');
      }
    });

    window.AppKml = {
      load: (url, category, name) => loadKml(url, category, name),
      listLayers: () => Object.keys(categories),
      listFiles: () => mapsMeta.map(m => ({ name: m.name, url: m.url, category: m.category }))
    };
  </script>
</body>
</html>
