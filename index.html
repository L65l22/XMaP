<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>XMaP (KML viewer)</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="map"></div>

  <div class="status" id="status" aria-live="polite" hidden></div>

  <button id="dropPinBtn" class="action-btn action-btn--drop" title="Placera nål" aria-label="Placera nål">📌</button>
  <button id="sharePosBtn" class="action-btn action-btn--share" title="Dela min plats" aria-label="Dela min plats">📍</button>
  <button id="layersBtn" class="fab" aria-label="Öppna lager">☰</button>

  <div id="layersSheet" class="sheet" role="dialog" aria-hidden="true" aria-label="Inlästa filer">
    <h3>Inlästa filer</h3>
    <div id="layersList">
      <div class="empty-state">Inga lager inlästa. Vänta medan automatisk laddning försöker hämta .kml från repo (om aktiverat).</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./vendor/togeojson.min.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
