<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Aggregator (KML only)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { margin:0; font-family: Arial, Helvetica, sans-serif; }
    #map { position: absolute; top:110px; bottom:0; left:0; right:0; }
    #control { position: absolute; left:10px; top:10px; right:10px; height:86px; background: rgba(255,255,255,0.96); padding:8px; border-radius:6px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; z-index:1000; }
    input[type=text] { padding:6px; }
    .grow { flex:1; min-width:200px; }
    button { padding:6px 10px; }
    #layersList { position:absolute; right:10px; top:10px; background:white; padding:8px; border-radius:6px; max-height:300px; overflow:auto; z-index:1000; }
    .catItem { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .small { font-size:0.9em; color:#444; }
    #debug { position:absolute; left:10px; bottom:10px; background:rgba(255,255,255,0.95); padding:8px; border-radius:6px; max-height:220px; overflow:auto; width:420px; font-size:0.85em; z-index:1000; }
  </style>
</head>
<body>
  <div id="control">
    <div style="display:flex;gap:8px;align-items:center;flex:1;">
      <input id="kmlUrl" class="grow" type="text" placeholder="Manuell raw URL till .kml (valfritt)" />
      <input id="category" type="text" placeholder="Kategori (t.ex. 'Vandringsleder')" style="width:160px" />
      <button id="addBtn">Lägg till</button>
    </div>

    <div style="display:flex;gap:8px;align-items:center;width:100%;">
      <button id="loadManifestBtn">Läs kml/list.json</button>
      <span class="small">— Använd manifestet i /kml för att ladda flera filer</span>
    </div>

    <div style="width:100%;display:flex;gap:8px;align-items:center;">
      <span id="status" style="font-size:0.95em;color:#333"></span>
    </div>
  </div>

  <div id="layersList"></div>
  <div id="map"></div>
  <div id="debug"><strong>Debug</strong><div id="debugContent"></div></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Lokal togeojson (behöver finnas: vendor/togeojson.min.js) -->
  <script src="./vendor/togeojson.min.js"></script>
  <script>
    const map = L.map('map').setView([59.33, 18.06], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap contributors' }).addTo(map);

    const categories = {};
    const mapsMeta = [];
    const statusEl = document.getElementById('status');
    const layersListEl = document.getElementById('layersList');
    const debugEl = document.getElementById('debugContent');

    function setStatus(s, err=false) {
      statusEl.textContent = s || '';
      const d = document.createElement('div');
      d.textContent = s;
      if (err) d.style.color = '#b00';
      debugEl.prepend(d);
      if (err) console.error(s); else console.log(s);
    }

    function ensureCategory(name) {
      if (!name) name = 'default';
      if (!categories[name]) categories[name] = L.layerGroup().addTo(map);
      return categories[name];
    }

    function renderLayersList() {
      layersListEl.innerHTML = '<strong>Kategorier</strong><br/>';
      Object.keys(categories).forEach(name => {
        const div = document.createElement('div');
        div.className = 'catItem';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = map.hasLayer(categories[name]);
        cb.onchange = () => cb.checked ? map.addLayer(categories[name]) : map.removeLayer(categories[name]);
        const label = document.createElement('span');
        label.textContent = name + ' (' + categories[name].getLayers().length + ')';
        div.appendChild(cb);
        div.appendChild(label);
        layersListEl.appendChild(div);
      });

      const metaDiv = document.createElement('div');
      metaDiv.style.marginTop = '8px';
      metaDiv.innerHTML = '<strong>Inlästa filer</strong><br/>';
      mapsMeta.forEach(m => {
        const r = document.createElement('div');
        r.textContent = m.name + ' → ' + m.category + ' | features: ' + (m.featureCount ?? '?');
        metaDiv.appendChild(r);
      });
      layersListEl.appendChild(metaDiv);
    }

    async function fetchText(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status + ' för ' + url);
      return await res.text();
    }

    async function loadKml(url, categoryName, displayName) {
      setStatus('Laddar KML: ' + url);
      try {
        if (typeof toGeoJSON === 'undefined') throw new Error('toGeoJSON saknas, lägg vendor/togeojson.min.js i repo');

        const kmlText = await fetchText(url);
        const parser = new DOMParser();
        const kmlDoc = parser.parseFromString(kmlText, 'text/xml');
        const geojson = toGeoJSON.kml(kmlDoc);

        const featureCount = Array.isArray(geojson.features) ? geojson.features.length : 0;
        setStatus('Konverterat till GeoJSON, features: ' + featureCount);
        if (Array.isArray(geojson.features)) {
          geojson.features.forEach(f => {
            if (!f.properties) f.properties = {};
            f.properties._sourceMap = displayName || url;
          });
        }

        const layer = L.geoJSON(geojson, {
          onEachFeature: (feature, lyr) => {
            let html = '<strong>' + (feature.properties?.name || '') + '</strong><br/>';
            if (feature.properties?.description) html += feature.properties.description;
            if (feature.properties?._sourceMap) html += '<hr/><em>' + feature.properties._sourceMap + '</em>';
            lyr.bindPopup(html);
          },
          pointToLayer: (feature, latlng) => L.circleMarker(latlng, { radius:6, fillColor:'#3388ff', color:'#fff', weight:1, fillOpacity:0.9 })
        });

        const cat = ensureCategory(categoryName || 'default');
        layer.addTo(cat);
        mapsMeta.push({ url, category: categoryName || 'default', name: displayName || url, layer, featureCount });
        renderLayersList();
        setStatus('Inläst: ' + (displayName || url) + ' (' + featureCount + ' features)');
        try { const b = layer.getBounds && layer.getBounds(); if (b && (b.isValid ? b.isValid() : b._southWest)) map.fitBounds(b, { maxZoom: 14 }); } catch(e){}
      } catch (err) {
        console.error(err);
        setStatus('Fel: ' + err.message, true);
      }
    }

    document.getElementById('addBtn').addEventListener('click', () => {
      const url = document.getElementById('kmlUrl').value.trim();
      const cat = document.getElementById('category').value.trim() || 'default';
      if (!url) { setStatus('Ange en URL till .kml', true); return; }
      loadKml(url, cat, url);
    });

    document.getElementById('loadManifestBtn').addEventListener('click', async () => {
      setStatus('Hämtar ./kml/list.json ...');
      try {
        const txt = await fetchText('./kml/list.json');
        setStatus('Manifest hämtad, längd: ' + txt.length + ' tecken');
        const list = JSON.parse(txt);
        if (!Array.isArray(list)) throw new Error('list.json måste vara en array');
        for (const item of list) {
          if (typeof item === 'string') {
            await loadKml('./kml/' + item, 'default', item);
          } else if (item && item.file) {
            await loadKml('./kml/' + item.file, item.category || 'default', item.file);
          } else {
            setStatus('Ignorerar manifest-entry: ' + JSON.stringify(item), true);
          }
        }
        setStatus('Manifest klar.');
      } catch (err) {
        console.error(err);
        setStatus('Fel vid manifest: ' + err.message, true);
      }
    });

    (async () => {
      try {
        const resp = await fetch('./kml/list.json');
        if (resp.ok) document.getElementById('loadManifestBtn').click();
      } catch(e){}
    })();
  </script>
</body>
</html>
